name: Update Quiz Positions
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false
jobs:
  quiz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git pull --rebase --autostash origin master || (git rebase --abort && echo "Pull failed, continuing with current state")
      - name: Extract positions
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERTEX_MODEL_OVERRIDE: "gemini-3.1-pro-preview"
        run: python -m scripts.generate_quiz
      - name: Commit quiz data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add -f site/public/data/quiz.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update quiz $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git fetch origin master
            if ! git pull --rebase --autostash origin master; then
              git rebase --abort || true
              echo "Rebase failed while syncing with origin/master."
              exit 1
            fi
            if git push origin HEAD:master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
