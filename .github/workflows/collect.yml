name: Collect (Foca)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      VERTEX_ACCESS_TOKEN: ${{ secrets.VERTEX_ACCESS_TOKEN }}
      VERTEX_BASE_URL: ${{ secrets.VERTEX_BASE_URL }}
      XIAOMI_MIMO_API_KEY: ${{ secrets.XIAOMI_MIMO_API_KEY }}
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Collect sources
        run: |
          python scripts/collect_rss.py
          python scripts/collect_parties.py || echo "parties failed, continuing"
          python scripts/collect_polls.py || echo "polls failed, continuing"
          python scripts/collect_social.py || echo "social failed, continuing"

      - name: Scrape article content
        run: python scripts/scrape_articles.py || echo "scrape failed, continuing"

      - name: AI processing
        run: |
          python scripts/summarize.py || echo "summarize failed, continuing"
          python scripts/analyze_sentiment.py || echo "sentiment failed, continuing"
          python scripts/build_data.py
          python scripts/generate_rss_feed.py || echo "rss feed failed, continuing"

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add data/
          git add site/public/feed*.xml 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore(ci): foca automated data refresh" && git push)
