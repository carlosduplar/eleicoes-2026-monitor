name: Collect (Reporter)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      VERTEX_ACCESS_TOKEN: ${{ secrets.VERTEX_ACCESS_TOKEN }}
      VERTEX_BASE_URL: ${{ secrets.VERTEX_BASE_URL }}
      XIAOMI_MIMO_API_KEY: ${{ secrets.XIAOMI_MIMO_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SCRAPE_LIMIT: "40"
      SUMMARIZE_LIMIT: "12"
      SENTIMENT_LIMIT: "12"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git pull --rebase --autostash origin master || (git rebase --abort && echo "Pull failed, continuing with current state")

      - name: Check Bright Data availability
        id: brightdata-check
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/bd_check.json -X POST "https://api.brightdata.com/request" \
            -H "Authorization: Bearer ${BRIGHTDATA_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"zone": "'${BRIGHTDATA_ZONE}'", "url": "https://example.com", "format": "raw"}' \
            --max-time 30 || echo "000")
          
          if [[ "$response" == "200" ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Bright Data is available"
          elif [[ "$response" == "429" ]]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Bright Data is rate-limited"
          else
            code=$(cat /tmp/bd_check.json | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('error','unknown'))" 2>/dev/null || echo "unknown")
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Bright Data unavailable: HTTP $response, error: $code"
          fi

      - name: Install Playwright Chromium (fallback only)
        if: steps.brightdata-check.outputs.available != 'true'
        run: playwright install chromium --with-deps

      - name: Sync editorial feedback
        run: python scripts/sync_editor_feedback.py

      - name: Collect sources
        run: |
          python scripts/collect_rss.py
          python scripts/collect_parties.py || echo "[warn] collect_parties failed"
          python scripts/collect_polls.py || echo "[warn] collect_polls failed"
          python scripts/collect_social.py || echo "[warn] collect_social failed"

      - name: Scrape article content
        run: python scripts/scrape_articles.py --limit "${SCRAPE_LIMIT}" || echo "scrape failed, continuing"

      - name: AI summarization (chunked)
        run: python scripts/summarize.py --limit "${SUMMARIZE_LIMIT}"

      - name: AI sentiment (chunked)
        run: python scripts/analyze_sentiment.py --limit "${SENTIMENT_LIMIT}"

      - name: Build derived data
        run: |
          python scripts/build_data.py
          python scripts/generate_rss_feed.py

      - name: Index to Vertex AI Search
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          VERTEX_SEARCH_ENGINE_ID: ${{ secrets.VERTEX_SEARCH_ENGINE_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python scripts/index_to_vertex_search.py || echo "[warn] Vertex indexing failed, continuing"

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add data/
          git add site/public/feed*.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(ci): reporter automated data refresh"

          for attempt in 1 2 3; do
            git fetch origin master

            if git merge origin/master --no-edit; then
              echo "Merge succeeded."
            else
              echo "Merge conflict detected, merging JSON files..."
              for f in data/*.json; do
                if [[ -f "$f" ]] && grep -q "^<\|^===\|^>>>" "$f" 2>/dev/null; then
                  echo "Resolving conflict in $f"
                  git show ":1:$f" > "$f.base" 2>/dev/null || echo "[]" > "$f.base"
                  git show ":3:$f" > "$f.remote" 2>/dev/null || echo "[]" > "$f.remote"
                  python scripts/merge_json.py "$f" "$f.remote" "$f"
                  rm -f "$f.base" "$f.remote"
                  git add "$f"
                fi
              done

              if git diff --name-only --diff-filter=U | grep -q .; then
                echo "Unresolved conflicts remain, using theirs..."
                git checkout --theirs data/*.json
                git add data/*.json
              fi

              git commit -m "chore(ci): resolve merge conflicts" || echo "No conflicts to commit"
            fi

            if git push origin HEAD:master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
