name: Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git pull --rebase --autostash origin master || (git rebase --abort && echo "Pull failed, continuing with current state")

      - name: Run watchdog
        run: python scripts/watchdog.py

      - name: Commit watchdog output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add data/pipeline_health.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(ci): watchdog pipeline health update"
          for attempt in 1 2 3; do
            git fetch origin master
            if ! git pull --rebase --autostash origin master; then
              git rebase --abort || true
              echo "Rebase failed while syncing with origin/master."
              exit 1
            fi
            if git push origin HEAD:master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
