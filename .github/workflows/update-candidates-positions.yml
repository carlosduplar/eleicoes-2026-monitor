name: Update Candidate Positions Draft

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      VERTEX_ACCESS_TOKEN: ${{ secrets.VERTEX_ACCESS_TOKEN }}
      VERTEX_BASE_URL: ${{ secrets.VERTEX_BASE_URL }}
      XIAOMI_MIMO_API_KEY: ${{ secrets.XIAOMI_MIMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git pull --rebase --autostash origin master || (git rebase --abort && echo "Pull failed, continuing with current state")

      - name: Ensure knowledge base exists
        run: |
          if [ ! -f data/candidates_positions.json ]; then
            python scripts/create_candidates_positions.py
          fi

      - name: Extract draft positions
        run: python -m scripts.extract_positions_from_articles --output data/candidates_positions_draft.json

      - name: Commit draft file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add data/candidates_positions_draft.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update candidates positions draft $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git fetch origin master
            if ! git pull --rebase --autostash origin master; then
              git rebase --abort || true
              echo "Rebase failed while syncing with origin/master."
              exit 1
            fi
            if git push origin HEAD:master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
