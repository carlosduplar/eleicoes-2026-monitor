name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "data/**"
      - "docs/case-study/**"

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate SEO pages
        run: python scripts/generate_seo_pages.py || echo "seo pages failed, continuing"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "site/package-lock.json"

      - name: Copy data into public assets
        run: |
          mkdir -p site/public/data
          cp -r data/. site/public/data/

      - name: Copy case-study into public assets
        run: |
          mkdir -p site/public/case-study
          cp -r docs/case-study/. site/public/case-study/ || true

      - name: Build static site
        run: |
          cd site
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
