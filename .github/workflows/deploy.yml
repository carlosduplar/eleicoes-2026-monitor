name: Deploy Pages

on:
  push:
    branches:
      - master
    paths:
      - "site/**"
      - "docs/case-study/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Collect (Reporter)", "Validate (Editor)", "Curate (Editor-chefe)"]
    types:
      - completed

permissions:
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate SEO pages
        run: python scripts/generate_seo_pages.py || echo "seo pages failed, continuing"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "site/package-lock.json"

      - name: Copy data into public assets
        run: |
          mkdir -p site/public/data
          cp -r data/. site/public/data/

      - name: Copy case-study into public assets
        run: |
          mkdir -p site/public/case-study
          cp -r docs/case-study/. site/public/case-study/

      - name: Build static site
        run: |
          cd site
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
