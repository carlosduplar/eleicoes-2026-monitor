name: Collect Government Data (TSE + Transparencia)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect-gov-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TRANSPARENCIA_API_KEY: ${{ secrets.TRANSPARENCIA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git pull --rebase --autostash origin master || (git rebase --abort && echo "Pull failed, continuing with current state")

      - name: Collect TSE data
        run: python scripts/collect_tse.py

      - name: Collect Transparencia data
        run: python scripts/collect_transparencia.py || echo "[warn] collect_transparencia failed, keeping existing data"

      - name: Commit updated government data
        run: |
          git add site/public/data/tse_data.json site/public/data/transparencia_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data(gov): update TSE + Transparencia data [skip ci]"
            git push origin HEAD:master
          fi
